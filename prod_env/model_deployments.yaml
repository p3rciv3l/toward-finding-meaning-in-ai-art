  - name: stepx-edit2
    backend: fal
    model: fal-ai/stepx-edit2
    timeout: 240.0
    fal:
      use_batch_api: false
      request_mode: subscribe
      with_logs: true
      poll_interval: 0.5
      enable_thinking_mode: true
      enable_reflection_mode: true
      output_format: png
      num_inference_steps: 50
      guidance_scale: 6.0
      sync_mode: false
      enable_safety_checker: true

  - name: z-image-turbo
    backend: fal
    model: fal-ai/z-image/turbo
    timeout: 180.0
    fal:
      use_batch_api: false
      request_mode: subscribe
      with_logs: true
      poll_interval: 0.5
      image_size:
        width: 1024
        height: 1536
      num_images: 1
      num_inference_steps: 8
      enable_prompt_expansion: true
      acceleration: regular
      output_format: png
      sync_mode: false
      enable_safety_checker: true

  - name: HunyuanImage-3.0-Instruct
